# examples/campaign_health.yaml — Campaign Health Score (CHS) real-world topology.
#
# Pattern exercised: orchestrator (entry.type: intent_router, orchestrator.kind: rule)
# Real-world use case: Multi-provider ad campaign health scoring pipeline (Facebook + Google Ads).
#   An Intent Router parses caller requests (UI / chat / copilot / workflow), routes them
#   to the CHS pipeline, which fans out per-campaign scoring in parallel and synthesises
#   an account-level health narrative.
#
# Opt-in features demonstrated:
#   - entry.type: intent_router   (LLM-based request parsing + intent routing)
#   - pattern: orchestrator       (supervisor-routed multi-agent topology)
#   - orchestrator.kind: rule     (deterministic routing — no supervisor LLM call)
#   - MCP tools on scorer + synthesizer agents
#   - HTTP tool for fetching ad platform metrics
#   - Langfuse observability tracing
#   - PostgreSQL backend (required by checkpointing)
#   - enable_checkpointing: true  (LangGraph AsyncPostgresSaver)
#   - 4-agent fan-out: campaign_scorer, insight_enricher, synthesizer, output_formatter

metadata:
  name: campaign_health
  description: >
    Campaign Health Score pipeline — scores every ad campaign across multiple providers
    (Facebook Ads, Google Ads) and presents a CEO-readable account health dashboard.
    Uses a rule-based orchestrator to fan out scoring agents in parallel, then synthesises
    a narrative and formats output per caller intent (UI / chat / copilot / workflow).
  python_version: "3.12"
  author: AgentForge Example
  email: engineering@example.com

entry:
  type: intent_router

pattern: orchestrator

orchestrator:
  kind: rule

agents:
  - key: campaign_scorer
    class_name: CampaignScorerAgent
    llm_model: gpt-4o-mini
    system_prompt: |
      You are a campaign performance scoring specialist for digital advertising.
      You receive raw campaign metrics (spend, ROAS, CTR, CPM, impressions, conversions)
      and score each campaign on four dimensions: efficiency (ROAS vs. account target),
      reach (CPM trend vs. prior period), engagement (CTR vs. account benchmark), and
      conversion (CPA vs. account target). Return a CampaignResult with scores 0-100
      per dimension and an overall health score. Always explain the primary driver of
      each score in one sentence. Never expose raw PII or account credentials.
    tools:
      - kind: mcp
        name: fetch_campaign_metrics
        description: Retrieve aggregated metrics for a single campaign from the data warehouse
        mcp_resource: fetch_campaign_metrics
      - kind: mcp
        name: get_account_benchmarks
        description: Get account-level ROAS, CTR, and CPA benchmarks for scoring calibration
        mcp_resource: get_account_benchmarks
    needs_validation: false
    extra_return_keys: ["campaign_id", "health_score", "score_dimensions", "primary_driver"]

  - key: insight_enricher
    class_name: InsightEnricherAgent
    llm_model: gpt-4o-mini
    system_prompt: |
      You are a campaign insight enrichment specialist. You receive a scored CampaignResult
      and augment it with actionable recommendations. Cross-reference the campaign's audience
      segment performance, creative fatigue signals, and budget pacing. Produce a ranked list
      of 1-3 recommended actions per campaign. Keep recommendations concise and business-focused.
    tools:
      - kind: http
        name: get_audience_insights
        description: Fetch audience segment breakdown and fatigue signals from the insights API
        url: https://example.com/api/v1/audience-insights
        method: GET
        auth_env_var: INSIGHTS_API_KEY
        timeout_s: 15.0
      - kind: mcp
        name: get_creative_fatigue
        description: Check creative fatigue score for a given ad set from the MCP server
        mcp_resource: get_creative_fatigue
    needs_validation: false
    extra_return_keys: ["campaign_id", "recommendations", "fatigue_score"]

  - key: synthesizer
    class_name: SynthesizerAgent
    llm_model: gpt-4o
    system_prompt: |
      You are a senior account health strategist. You receive scored and enriched results
      for every campaign in an ad account and produce two outputs:
      1. An account health score (0-100) as a weighted average of campaign health scores,
         weighted by each campaign's spend share.
      2. A concise executive narrative (3-5 sentences) identifying the top opportunity
         and the most urgent risk across the account.
      Use direct, CEO-readable language. Do not list raw metrics — translate numbers into
      business impact. Never mention individual user data or PII.
    tools:
      - kind: mcp
        name: compute_account_score
        description: Aggregate campaign health scores into an account-level score with spend weighting
        mcp_resource: compute_account_score
    needs_validation: false
    extra_return_keys: ["account_health_score", "top_opportunity", "urgent_risk", "narrative"]

  - key: output_formatter
    class_name: OutputFormatterAgent
    llm_model: gpt-4o-mini
    system_prompt: |
      You are a response formatting specialist. You receive the synthesised account health
      data and format it for the caller's intent_type:
        - "ui"       → HealthScoreWidget JSON (dashboard cards with colour coding)
        - "chat"     → Conversational summary with markdown formatting
        - "copilot"  → Structured JSON suitable for IDE tooling
        - "workflow" → Raw JSON for n8n / automation pipelines
      Always include: account_health_score, top_opportunity, urgent_risk, campaign_count,
      campaigns_needing_attention (score < 60), and the full campaign_results list.
    tools:
      - kind: mcp
        name: render_health_widget
        description: Render formatted HealthScoreWidget JSON for the dashboard UI
        mcp_resource: render_health_widget
    needs_validation: false
    extra_return_keys: ["formatted_output", "intent_type", "campaign_count"]

database:
  backend: postgres
  tables:
    - campaigns
    - ad_accounts
    - campaign_metrics
    - scoring_results
    - account_snapshots
  connection_env_var: DATABASE_URL
  pool_size: 10
  max_overflow: 20
  use_alembic: true

workflow:
  enable_feedback_loop: true
  enable_validation_node: true
  router_llm_model: gpt-4o-mini
  router_llm_provider: openai
  default_intent: campaign_scorer
  max_feedback_attempts: 2
  enable_checkpointing: true

api:
  title: Campaign Health Score API
  query_max_length: 4000
  endpoints:
    - /health-score
    - /account-summary
    - /campaign-detail
  cors:
    origins:
      - "https://app.example.com"
      - "http://localhost:3000"
    allow_credentials: false

observability:
  enable_tracing: true
  tracing_provider: langfuse
  context_fields:
    - request_id
    - account_id
    - intent_type
    - session_id
  log_rotation_bytes: 10485760
  log_backup_count: 5
  structured_logging: false

security:
  auth_type: api_key
  api_key_env_var: CHS_API_KEY
  enable_ip_pseudonymization: true

ci:
  provider: github
  python_version: "3.12"
  installer: uv

development:
  pre_commit: true

testing:
  eval_framework: deepeval
  enable_benchmarks: true

enable_provider_registry: true
